model:
  name: nnunet
  n_channels: 3
  n_classes: 2
  base_features: 64       # Feature channels at first encoder level
  depth: 5                # Encoder/decoder depth (32→64→128→256→320)

# base_features	depth	Approx params	Use when
# 32		    5~	    19M		        Default, good balance
# 32		    4~	    9M		        Small dataset / fast test
# 64		    5~	    31M		        Large dataset, more GPU memory

dataset:
  images_dir: /data_64T_3/Raja/Alex_project/dataset/training/patches
  masks_dir: /data_64T_3/Raja/Alex_project/dataset/training/masks
  img_size: [512, 512]
  num_workers: 4
  augment: true      # utils/autmentations.py Resize → Random flips → Rotation → Crop → Color jitter → Blur → Normalize
  val_split: 0.1     # Used only in single fold + train_val_test mode
  test_split: 0.2    # Holdout test set fraction (both modes)

training:
  fold_mode: single             # Options: single | kfold
  n_folds: 5                    # Used only when fold_mode: kfold
  eval_mode: train_val          # Options: train_val_test | train_val | train_test | training_only
  epochs: 100
  batch_size: 4                 # nnU-Net is heavier — keep batch small
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  amp: true
  early_stopping_patience: 15
  loss: dice_ce                 # Options: cross_entropy | dice | dice_ce

optimizer:
  name: adam
  momentum: 0.9

scheduler:
  name: cosine
  step_size: 30
  gamma: 0.1
  min_lr: 1.0e-6

logging:
  log_dir: logs/nnunet_dataset   # datetime/fold subdirs created automatically
  log_interval: 10
