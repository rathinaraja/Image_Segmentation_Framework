model:
  name: swinunet
  n_channels: 3
  n_classes: 2
  img_size: 224           # Swin works best at 224 (divisible by patch*window*8)
  patch_size: 4
  embed_dim: 96           # base channels C (stages: 96 → 192 → 384 → 768)
  depths: [2, 2, 2, 2]   # SwinBlocks per stage [enc0, enc1, enc2, bottleneck]
  num_heads: [3, 6, 12, 24]
  window_size: 7          # local attention window (must divide img_size/patch_size)
  mlp_ratio: 4.0
  drop_rate: 0.0
  attn_drop: 0.0

dataset:
  images_dir: /data_64T_3/Raja/Alex_project/dataset/patches
  masks_dir: /data_64T_3/Raja/Alex_project/dataset/masks
  img_size: [224, 224]    # must match model.img_size
  num_workers: 4
  augment: true                # utils/autmentations.py Resize → Random flips → Rotation → Crop → Color jitter → Blur → Normalize
  val_split: 0.1               # Used only in single fold + train_val_test mode
  test_split: 0.2              # Holdout test set fraction (both modes)

training:
  fold_mode: single            # Options: single | kfold
  n_folds: 5                   # Used only when fold_mode: kfold
  eval_mode: train_val_test    # Options: train_val_test | train_val | train_test | training_only
  epochs: 1
  batch_size: 2
  learning_rate: 5.0e-5
  weight_decay: 1.0e-4
  amp: true
  early_stopping_patience: 15
  loss: dice_ce                 # Options: cross_entropy | dice | dice_ce

optimizer:
  name: adamw
  momentum: 0.9

scheduler:
  name: cosine
  step_size: 30
  gamma: 0.1
  min_lr: 1.0e-6

logging:
  log_dir: logs/swinunet_dataset   # datetime/fold subdirs created automatically
  log_interval: 10
